<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scene 2 – Terrain & Environment (Physics Player)</title>

  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #05070d;
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .top-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 30;
    }

    .scene-header {
      padding: 0.75rem 1.25rem;
      background: #080c18;
      border-bottom: 1px solid #161b2a;
    }

    .scene-header h1 {
      margin: 0;
      font-size: 1.2rem;
    }

    .back-button {
      display: inline-block;
      margin-top: 0.25rem;
      font-size: 0.9rem;
      color: #8ac7ff;
      text-decoration: none;
      pointer-events: auto;
    }

    .back-button:hover {
      text-decoration: underline;
    }

    .scene-info {
      padding: 0.5rem 1.25rem;
      font-size: 0.9rem;
      color: #b0bfdc;
      background: #060914;
      border-bottom: 1px solid #161b2a;
    }

    #renderCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      display: block;
    }

    #pauseOverlay {
      position: fixed;
      top: 110px;
      left: 0;
      width: 100vw;
      height: calc(100vh - 110px);
      background: rgba(0, 0, 0, 0.55);
      color: white;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 20;
      font-size: 2rem;
      text-align: center;
      padding: 1rem;
      box-sizing: border-box;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <header class="scene-header">
      <h1>Scene 2 – Terrain & Environment (Physics Player)</h1>
      <a class="back-button" href="../index.html">← Back to Home</a>
    </header>
    <div class="scene-info">
      Click the canvas to lock the mouse · WASD = Move · Mouse = Look · Shift = Sprint · Z = Jump · C = Toggle 1st / 3rd Person · P = Pause / Resume
    </div>
  </div>

  <canvas id="renderCanvas"></canvas>
  <div id="pauseOverlay">Paused — Press P to Resume</div>

  <script src="../js/scene2.js"></script>
</body>
</html>
